<div class="project-card" [class.featured]="!!project.liveUrl">
  <div class="card-header">
    <h3>{{ project.name | titlecase }}</h3>
    @if (project.liveUrl) {
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    }
  </div>
  <p>{{ project.description }}</p>

  <div class="tech-stack">
    @for (tech of project.topics; track tech) {
      <span class="tag">{{ tech }}</span>
    }
  </div>

  @if (project.liveUrl) {
    <button class="view-btn live-btn" (click)="onLiveClick()">View Live ↗</button>
  } @else {
    <button class="view-btn" (click)="onGithubClick()">View on GitHub</button>
  }
</div>
