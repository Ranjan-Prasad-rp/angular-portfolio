<div class="project-card">

  <!-- display project data using @Input -->
  <h3>{{ project.title }}</h3>
  <p>{{ project.description }}</p>

  <!-- loop tech stack tags -->
  <div class="tech-tags">
    @for (tech of project.techStack; track tech) {
    <span class="tag">{{ tech }}</span>
    }
  </div>

  <!-- featured badge -->
  @if (project.featured) {
  <span class="featured">⭐ Featured</span>
  }

  <!-- button fires @Output event -->
  <button (click)="onGithubClick()">View on GitHub</button>

</div>
